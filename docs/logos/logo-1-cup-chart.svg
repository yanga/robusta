<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="steam1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#0f0f23" />

  <!-- Coffee cup body -->
  <path d="M 110 190 L 120 310 Q 125 340 155 340 L 245 340 Q 275 340 280 310 L 290 190 Z"
        fill="url(#grad1)" rx="10" />

  <!-- Cup handle -->
  <path d="M 290 210 Q 340 210 340 255 Q 340 300 290 300"
        fill="none" stroke="#6366f1" stroke-width="14" stroke-linecap="round" />

  <!-- Bar chart bars rising from cup (as steam) -->
  <rect x="145" y="130" width="22" height="60" rx="4" fill="#a78bfa" opacity="0.7" />
  <rect x="177" y="100" width="22" height="90" rx="4" fill="#818cf8" opacity="0.8" />
  <rect x="209" y="70" width="22" height="120" rx="4" fill="#6366f1" opacity="0.9" />
  <rect x="241" y="50" width="22" height="140" rx="4" fill="#4f46e5" />

  <!-- Trend line over bars -->
  <polyline points="156,125 188,95 220,65 252,45"
           fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="156" cy="125" r="5" fill="#f59e0b" />
  <circle cx="188" cy="95" r="5" fill="#f59e0b" />
  <circle cx="220" cy="65" r="5" fill="#f59e0b" />
  <circle cx="252" cy="45" r="5" fill="#f59e0b" />

  <!-- Text -->
  <text x="200" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="white" letter-spacing="2">BREWLYTICS</text>
</svg>
