<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="g3b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="190" r="175" fill="#0f0f23" />

  <!-- Beaker / flask shape -->
  <!-- Neck -->
  <rect x="170" y="40" width="60" height="60" rx="4" fill="none" stroke="#6366f1" stroke-width="4" />
  <!-- Rim -->
  <line x1="155" y1="40" x2="245" y2="40" stroke="#6366f1" stroke-width="4" stroke-linecap="round" />

  <!-- Flask body -->
  <path d="M 170 100 L 105 280 Q 100 300 120 310 L 280 310 Q 300 300 295 280 L 230 100"
        fill="none" stroke="#6366f1" stroke-width="4" />

  <!-- Liquid fill -->
  <path d="M 140 200 L 108 280 Q 103 300 123 308 L 277 308 Q 297 300 292 280 L 260 200 Z"
        fill="url(#g3)" />

  <!-- Data bubbles rising in the liquid -->
  <circle cx="160" cy="270" r="12" fill="#8b5cf6" opacity="0.8" />
  <circle cx="220" cy="250" r="16" fill="#a78bfa" opacity="0.7" />
  <circle cx="180" cy="230" r="10" fill="#6366f1" opacity="0.9" />
  <circle cx="240" cy="280" r="8" fill="#c4b5fd" opacity="0.6" />
  <circle cx="200" cy="260" r="14" fill="#818cf8" opacity="0.75" />

  <!-- Rising bubbles (above liquid) -->
  <circle cx="185" cy="180" r="6" fill="#a78bfa" opacity="0.4" />
  <circle cx="210" cy="155" r="4" fill="#a78bfa" opacity="0.3" />
  <circle cx="195" cy="130" r="3" fill="#a78bfa" opacity="0.2" />

  <!-- Mini chart inside liquid -->
  <polyline points="130,290 155,270 175,280 200,250 225,260 250,240 275,250"
           fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Measurement lines on flask -->
  <line x1="118" y1="260" x2="135" y2="260" stroke="#4f46e5" stroke-width="2" opacity="0.5" />
  <line x1="112" y1="240" x2="140" y2="240" stroke="#4f46e5" stroke-width="2" opacity="0.5" />
  <line x1="126" y1="220" x2="145" y2="220" stroke="#4f46e5" stroke-width="2" opacity="0.5" />
  <line x1="133" y1="200" x2="148" y2="200" stroke="#4f46e5" stroke-width="2" opacity="0.5" />

  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="white" letter-spacing="2">BREWLYTICS</text>
</svg>
