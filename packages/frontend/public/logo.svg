<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark brown circle background -->
  <circle cx="100" cy="100" r="95" fill="#3E2723" />

  <!-- Cup body -->
  <ellipse cx="90" cy="138" rx="52" ry="38" fill="#8D6E4C" />
  <ellipse cx="90" cy="130" rx="48" ry="14" fill="#3E2723" />
  <!-- Cup highlight -->
  <path d="M 60 145 Q 70 165 95 162 Q 80 158 68 145 Z" fill="#A0845C" opacity="0.6" />

  <!-- Cup rim (white ellipse) -->
  <ellipse cx="90" cy="108" rx="52" ry="16" fill="none" stroke="white" stroke-width="3" />

  <!-- Cup handle -->
  <path d="M 138 118 Q 158 118 158 138 Q 158 158 138 155"
        fill="none" stroke="#8D6E4C" stroke-width="8" stroke-linecap="round" />

  <!-- Bar chart bars inside cup -->
  <rect x="62" y="92" width="12" height="22" rx="2" fill="#6B9B37" />
  <rect x="80" y="82" width="12" height="32" rx="2" fill="#D4A84B" />
  <rect x="98" y="72" width="12" height="42" rx="2" fill="#6B9B37" />
  <rect x="116" y="62" width="12" height="52" rx="2" fill="#4CAF50" />

  <!-- Steam wisps -->
  <path d="M 72 70 Q 65 55 72 40 Q 79 25 72 10"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85" />
  <path d="M 58 75 Q 52 62 58 48 Q 64 34 58 20"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.65" />
</svg>
